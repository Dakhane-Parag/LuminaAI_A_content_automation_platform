##############################################################
# BrandFlow AI — Nginx Configuration
# Reverse proxy: port 80 → Gunicorn at 127.0.0.1:8000
##############################################################

server {
    listen 80;
    server_name _;   # catch-all — works with raw EC2 IP

    # ── Max upload size (for image uploads if ever needed) ───
    client_max_body_size 20M;

    # ── FastAPI / Gunicorn (all /api/* and root) ─────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Required headers for WebSocket / ASGI
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Pass real client info to FastAPI
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts (AI generation can take ~10–30s)
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
    }

    # ── Generated images served as static files ───────────────
    # Avoids proxying large image downloads through Python
    location /generated_images/ {
        alias /home/ubuntu/app/backend/generated_images/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Health check (quick response) ─────────────────────────
    location /nginx-health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
        access_log off;
    }
}
